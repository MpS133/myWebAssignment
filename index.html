<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bridge Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;width:100vw}

    .bg{position:fixed;inset:0;z-index:0;
      background-image:url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1920&q=90');
      background-size:cover;background-position:center;
      animation:drift 22s ease-in-out infinite alternate}
    @keyframes drift{from{transform:scale(1.06) translate(0,0)}to{transform:scale(1.10) translate(-1.5%,-0.8%)}}
    .bg::before{content:'';position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(8,4,28,0.6) 0%,rgba(20,8,50,0.4) 40%,rgba(8,3,22,0.7) 100%)}
    .bg::after{content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,rgba(80,20,120,0.25),transparent 60%,rgba(20,60,120,0.2))}

    .stars{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
    .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite}
    @keyframes twinkle{0%,100%{opacity:0.1;transform:scale(0.8)}50%{opacity:0.9;transform:scale(1)}}

    .particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
    .particle{position:absolute;border-radius:50%;background:rgba(255,220,120,0.8);animation:rise linear infinite}
    @keyframes rise{0%{transform:translateY(105vh);opacity:0}10%{opacity:1}90%{opacity:0.3}100%{transform:translateY(-5vh);opacity:0}}

    .home{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:24px}

    .logo-wrap{text-align:center;animation:fadeUp 0.8s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .logo-svg{display:block;margin:0 auto 8px;width:140px;height:auto;
      filter:drop-shadow(0 0 22px rgba(255,200,60,0.8));animation:glow 3s ease-in-out infinite}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 14px rgba(255,180,0,0.5))}50%{filter:drop-shadow(0 0 38px rgba(255,220,60,1))}}
    .title{font-family:'Baloo 2',cursive;font-size:74px;line-height:1;color:#fff;
      text-shadow:0 0 80px rgba(160,90,255,0.7),0 4px 24px rgba(0,0,0,0.9);letter-spacing:-2px}
    .title span{background:linear-gradient(135deg,#ffe234,#ff8c28,#ff3d87);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tagline{font-size:12px;font-weight:900;letter-spacing:6px;color:rgba(255,255,255,0.45);text-transform:uppercase;margin-top:10px}

    .card{background:rgba(255,255,255,0.07);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      border:1px solid rgba(255,255,255,0.13);border-radius:28px;padding:24px 36px;
      box-shadow:0 24px 64px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.12);
      animation:fadeUp 0.9s 0.12s ease both;display:flex;flex-direction:column;align-items:center;gap:10px;min-width:320px}

    @media(max-width:600px){
      .title{font-size:44px;letter-spacing:-1px}
      .tagline{font-size:10px;letter-spacing:3px}
      .logo-svg{width:100px}
      .card{min-width:0;width:calc(100vw - 32px);padding:18px 16px}
      .mode-card{padding:10px 6px 10px}
      .mode-name{font-size:13px}
      .mode-desc{font-size:8px}
      .btn{font-size:14px;padding:10px 18px}
      .music-btn,.start-hint{bottom:12px}
      .music-btn{right:12px;font-size:11px;padding:7px 12px}
      .home{gap:14px}
    }

    .mode-label{font-size:10px;font-weight:900;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:2px;align-self:flex-start}
    .mode-row{display:flex;gap:10px;width:100%}

    .mode-card{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
      padding:14px 10px 12px;border:none;border-radius:18px;cursor:pointer;text-decoration:none;
      transition:all 0.2s;font-family:'Baloo 2',cursive;}

    .mode-card.classic{background:linear-gradient(135deg,rgba(60,200,120,0.2),rgba(20,100,60,0.28));
      border:1.5px solid rgba(80,220,140,0.3);box-shadow:0 4px 20px rgba(30,180,100,0.1)}
    .mode-card.classic:hover{background:linear-gradient(135deg,rgba(60,200,120,0.38),rgba(20,100,60,0.44));
      border-color:rgba(80,220,140,0.55);transform:translateY(-4px) scale(1.03);
      box-shadow:0 12px 32px rgba(30,200,100,0.28)}

    .mode-card.ranked{background:linear-gradient(135deg,rgba(255,180,30,0.2),rgba(200,60,10,0.28));
      border:1.5px solid rgba(255,200,60,0.3);box-shadow:0 4px 20px rgba(255,140,20,0.1)}
    .mode-card.ranked:hover{background:linear-gradient(135deg,rgba(255,180,30,0.38),rgba(200,60,10,0.44));
      border-color:rgba(255,200,60,0.55);transform:translateY(-4px) scale(1.03);
      box-shadow:0 12px 32px rgba(255,160,0,0.28)}

    .mode-icon{font-size:34px;line-height:1;margin-bottom:2px}
    .mode-name{font-size:15px;font-weight:800;letter-spacing:1px;color:#fff}
    .mode-desc{font-size:9px;font-weight:700;letter-spacing:.4px;color:rgba(255,255,255,0.48);text-transform:uppercase;text-align:center;line-height:1.5}

    .divider{width:100%;height:1px;background:rgba(255,255,255,0.09);margin:2px 0}

    .btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
      padding:12px 28px;border:none;border-radius:50px;cursor:pointer;
      font-family:'Baloo 2',cursive;font-size:16px;letter-spacing:1px;text-decoration:none;transition:all 0.18s}
    .btn-sec{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.85);
      border:1px solid rgba(255,255,255,0.18);box-shadow:0 3px 12px rgba(0,0,0,0.25)}
    .btn-sec:hover{background:rgba(255,255,255,0.16);color:#fff;transform:translateY(-2px);border-color:rgba(255,255,255,0.3)}
    .btn-sec:active{transform:translateY(1px)}

    /* Ranked progress badge */
    .rank-badge{display:none;align-items:center;gap:6px;padding:4px 14px;
      background:rgba(255,200,60,0.1);border:1px solid rgba(255,200,60,0.28);border-radius:20px;
      font-size:11px;font-weight:800;color:rgba(255,210,100,0.8);letter-spacing:.5px;margin-top:-2px}
    .rank-badge.show{display:flex}

    .ver{color:rgba(255,255,255,0.22);font-size:11px;letter-spacing:4px;animation:fadeUp 1s 0.25s ease both}

    .music-btn{position:fixed;bottom:22px;right:22px;z-index:50;
      display:flex;align-items:center;gap:7px;padding:9px 18px;
      background:rgba(255,255,255,0.09);backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.18);border-radius:50px;
      color:rgba(255,255,255,0.85);font-size:12px;font-weight:800;
      cursor:pointer;letter-spacing:1px;font-family:'Nunito',sans-serif;transition:all 0.2s}
    .music-btn:hover{background:rgba(255,255,255,0.16);transform:scale(1.04)}
    .music-btn.off{background:rgba(200,50,50,0.3);border-color:rgba(255,80,80,0.4)}
    .start-hint{font-size:10px;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,0.32);
      text-transform:uppercase;margin-top:8px;animation:fadeUp 1.2s 1s ease both;
      pointer-events:none;text-align:center}
  </style>
</head>
<body>

<div class="bg"></div>
<div class="stars" id="stars"></div>
<div class="particles" id="particles"></div>

<div class="home">
  <div class="logo-wrap">
    <!-- SVG Bridge Logo -->
    <svg class="logo-svg" viewBox="0 0 140 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Water -->
      <rect x="0" y="58" width="140" height="22" fill="#1a6888" rx="2" opacity="0.85"/>
      <!-- Water shimmer -->
      <line x1="10" y1="63" x2="50" y2="63" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="70" y1="66" x2="120" y2="66" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
      <!-- Left land -->
      <polygon points="0,52 28,52 28,80 0,80" fill="#3a5230" opacity="0.9"/>
      <!-- Right land -->
      <polygon points="112,52 140,52 140,80 112,80" fill="#3a5230" opacity="0.9"/>
      <!-- Bridge deck surface (road) -->
      <rect x="22" y="48" width="96" height="6" fill="#c07010" rx="1"/>
      <rect x="22" y="48" width="96" height="2.5" fill="#e09020" rx="1"/>
      <!-- Left railing posts -->
      <line x1="30" y1="42" x2="30" y2="48" stroke="#f0c030" stroke-width="1.5"/>
      <line x1="42" y1="42" x2="42" y2="48" stroke="#f0c030" stroke-width="1.5"/>
      <line x1="54" y1="42" x2="54" y2="48" stroke="#f0c030" stroke-width="1.5"/>
      <!-- Right railing posts -->
      <line x1="86" y1="42" x2="86" y2="48" stroke="#f0c030" stroke-width="1.5"/>
      <line x1="98" y1="42" x2="98" y2="48" stroke="#f0c030" stroke-width="1.5"/>
      <line x1="110" y1="42" x2="110" y2="48" stroke="#f0c030" stroke-width="1.5"/>
      <!-- Railing top bar -->
      <line x1="22" y1="42" x2="118" y2="42" stroke="#ffd840" stroke-width="1.5" opacity="0.7"/>
      <!-- Left Tower -->
      <rect x="58" y="10" width="8" height="40" fill="#f0b820" rx="2"/>
      <rect x="55" y="7" width="14" height="5" fill="#ffd040" rx="1.5"/>
      <!-- Right Tower -->
      <rect x="74" y="10" width="8" height="40" fill="#f0b820" rx="2"/>
      <rect x="71" y="7" width="14" height="5" fill="#ffd040" rx="1.5"/>
      <!-- Tower crossbars -->
      <rect x="58" y="26" width="8" height="3" fill="#ffc020" rx="1"/>
      <rect x="74" y="26" width="8" height="3" fill="#ffc020" rx="1"/>
      <!-- Left backstay cable -->
      <line x1="22" y1="50" x2="62" y2="9" stroke="#ffe880" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
      <!-- Right backstay cable -->
      <line x1="118" y1="50" x2="78" y2="9" stroke="#ffe880" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
      <!-- Main span cable (sags between tower tops) -->
      <path d="M62,9 Q70,56 78,9" stroke="#ffe880" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
      <!-- Hanger cables from main span to deck -->
      <line x1="64.5" y1="18" x2="64.5" y2="48" stroke="#ffe880" stroke-width="1" opacity="0.55"/>
      <line x1="67.5" y1="30" x2="67.5" y2="48" stroke="#ffe880" stroke-width="1" opacity="0.55"/>
      <line x1="70" y1="36" x2="70" y2="48" stroke="#ffe880" stroke-width="1" opacity="0.55"/>
      <line x1="72.5" y1="30" x2="72.5" y2="48" stroke="#ffe880" stroke-width="1" opacity="0.55"/>
      <line x1="75.5" y1="18" x2="75.5" y2="48" stroke="#ffe880" stroke-width="1" opacity="0.55"/>
    </svg>
    <h1 class="title">Bridge<span>Simulator</span></h1>
    <p class="tagline">Design · Build · Test · Cross</p>
    <p class="start-hint" id="startHint">Click anywhere · Enable music</p>
  </div>

  <div class="card">
    <div class="mode-label">Choose Your Mode</div>
    <div class="mode-row">
      <a class="mode-card classic" href="levelselect.html?mode=classic" onclick="BSAudio.sfx('click')">
        <span class="mode-icon">🎮</span>
        <span class="mode-name">CLASSIC</span>
        <span class="mode-desc">No budget · Free play · All levels open</span>
      </a>
      <a class="mode-card ranked" href="levelselect.html?mode=ranked" onclick="BSAudio.sfx('click')">
        <span class="mode-icon">🏆</span>
        <span class="mode-name">RANKED</span>
        <span class="mode-desc">Budget limits · Unlock stages · Earn stars</span>
      </a>
    </div>
    <div class="rank-badge" id="rankBadge">🏅 Ranked: <span id="rankProgress"></span></div>
    <div class="divider"></div>
    <a class="btn btn-sec" href="leaderboard.html">🏆 &nbsp;LEADERBOARD</a>
    <a class="btn btn-sec" href="howtoplay.html" onclick="BSAudio.sfx('click')">📖 &nbsp;HOW TO PLAY</a>
    <a class="btn btn-sec" href="settings.html" onclick="BSAudio.sfx('click')">⚙️ &nbsp;SETTINGS</a>
  </div>

  <p class="ver">v4.0 · 10 LEVELS · CLASSIC + RANKED</p>
</div>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵 MUSIC ON</button>

<script src="audio.js"></script>
<script>
// Stars background
const sc=document.getElementById('stars');
for(let i=0;i<70;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s`;
  sc.appendChild(s);
}
const pc=document.getElementById('particles');
for(let i=0;i<25;i++){
  const p=document.createElement('div');p.className='particle';
  const sz=Math.random()*3+1;
  p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*12}s;opacity:${0.4+Math.random()*0.5}`;
  pc.appendChild(p);
}

// Show ranked progress badge if there's any progress
function loadRankBadge(){
  try{
    const p=JSON.parse(localStorage.getItem('bridgeProgress')||'{}');
    const completed=(p.completed||[]).filter(Boolean).length;
    const totalStars=(p.stars||[]).reduce((s,x)=>s+(x||0),0);
    if(completed>0){
      document.getElementById('rankProgress').textContent=`${completed}/10 stages · ${totalStars} ⭐`;
      document.getElementById('rankBadge').classList.add('show');
    }
  }catch(e){}
}
loadRankBadge();

BSAudio.loadSettings();
let musicStarted=false;
function tryStartMusic(){
  if(musicStarted)return; musicStarted=true;
  document.getElementById('startHint').style.opacity='0';
  BSAudio.unlock();
  if(BSAudio.cfg.soundOn) BSAudio.playBg('home');
  updateMusicBtn();
}
document.addEventListener('click',tryStartMusic);
function toggleMusic(){
  BSAudio.cfg.soundOn=!BSAudio.cfg.soundOn;
  if(BSAudio.cfg.soundOn){if(!musicStarted)tryStartMusic();else BSAudio.playBg('home');}
  else BSAudio.stopBg();
  updateMusicBtn();
  try{const s=JSON.parse(localStorage.getItem('bridgeSettings')||'{}');s.soundOn=BSAudio.cfg.soundOn;localStorage.setItem('bridgeSettings',JSON.stringify(s));}catch(e){}
}
function updateMusicBtn(){
  const b=document.getElementById('musicBtn');
  b.textContent=BSAudio.cfg.soundOn?'🎵 MUSIC ON':'🔇 MUSIC OFF';
  b.className='music-btn'+(BSAudio.cfg.soundOn?'':' off');
}
updateMusicBtn();
</script>
</body>
</html>
