<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Settings — Bridge Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;min-height:100vh}

    /* WALLPAPER — dark ocean waves */
    .bg{position:fixed;inset:0;z-index:0;
      background-image:url('https://images.unsplash.com/photo-1518655048521-f130df041f66?auto=format&fit=crop&w=1920&q=90');
      background-size:cover;background-position:center;
      animation:drift 28s ease-in-out infinite alternate}
    @keyframes drift{from{transform:scale(1.04)}to{transform:scale(1.07) translate(0.5%,-0.5%)}}
    .bg::before{content:'';position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(4,8,30,0.7) 0%,rgba(8,16,48,0.5) 50%,rgba(4,8,28,0.75) 100%)}

    .page{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}

    .card{background:rgba(255,255,255,0.07);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
      border:1px solid rgba(255,255,255,0.12);border-radius:28px;padding:38px 46px;
      max-width:500px;width:100%;box-shadow:0 28px 72px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.09);
      animation:fadeUp 0.6s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

    .title{font-family:'Baloo 2',cursive;font-size:34px;color:#fff;text-align:center;margin-bottom:4px;
      text-shadow:0 0 30px rgba(100,160,255,0.5)}
    .subtitle{font-size:11px;font-weight:800;letter-spacing:4px;color:rgba(255,255,255,0.3);
      text-align:center;text-transform:uppercase;margin-bottom:28px}

    /* BIG sound toggle */
    .sound-big{width:100%;display:flex;align-items:center;justify-content:space-between;
      padding:15px 20px;border:2px solid rgba(255,255,255,0.12);border-radius:16px;
      background:rgba(255,255,255,0.05);cursor:pointer;transition:all 0.2s;margin-bottom:18px;
      font-family:'Nunito',sans-serif}
    .sound-big:hover{background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.22);transform:translateY(-1px)}
    .sound-big.off{border-color:rgba(200,60,60,0.35);background:rgba(200,60,60,0.07)}

    .sb-left{display:flex;align-items:center;gap:13px}
    .sb-ico{font-size:28px;line-height:1;transition:all 0.25s}
    .sound-big.off .sb-ico{opacity:0.4;transform:scale(0.88)}
    .sb-label b{display:block;font-size:14px;font-weight:900;color:#fff}
    .sb-label span{font-size:11px;color:rgba(255,255,255,0.4)}

    .sb-pill{padding:6px 16px;border-radius:50px;border:none;pointer-events:none;
      font-family:'Baloo 2',cursive;font-size:13px;font-weight:700;letter-spacing:1px;transition:all 0.2s}
    .sb-pill.on{background:linear-gradient(135deg,#5ce85c,#28b028);color:#fff;box-shadow:0 2px 12px rgba(60,180,60,0.45)}
    .sb-pill.off{background:rgba(180,50,50,0.6);color:rgba(255,255,255,0.65)}

    /* Volume sliders */
    .vol-section{transition:opacity 0.3s}
    .vol-section.muted{opacity:0.28;pointer-events:none}

    .row{margin-bottom:20px}
    .row-label{font-size:11.5px;font-weight:900;color:rgba(255,255,255,0.65);letter-spacing:1.5px;
      text-transform:uppercase;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
    .row-val{font-family:'Baloo 2',cursive;font-size:15px;color:#f5d020;letter-spacing:0}

    .vol-bar{display:flex;align-items:center;gap:11px}
    .vi{font-size:18px;cursor:pointer;transition:transform 0.15s;line-height:1;user-select:none;flex-shrink:0}
    .vi:hover{transform:scale(1.2)}

    input[type=range]{-webkit-appearance:none;flex:1;height:6px;border-radius:3px;
      background:rgba(255,255,255,0.14);outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:21px;height:21px;
      border-radius:50%;background:linear-gradient(135deg,#ffe234,#ff8c28);
      box-shadow:0 2px 8px rgba(200,120,0,0.45);cursor:pointer;border:2px solid rgba(255,255,255,0.5);transition:transform 0.15s}
    input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}

    .divider{height:1px;background:rgba(255,255,255,0.08);margin:18px 0}

    /* Toggles */
    .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0}
    .tl-text b{display:block;font-size:13px;font-weight:800;color:rgba(255,255,255,0.75)}
    .tl-text span{font-size:11px;color:rgba(255,255,255,0.35)}

    .toggle{position:relative;width:48px;height:26px;cursor:pointer;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .track{position:absolute;inset:0;background:rgba(255,255,255,0.14);border-radius:13px;transition:background 0.25s}
    .toggle input:checked + .track{background:linear-gradient(90deg,#ffe234,#ff8c28)}
    .thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;
      transition:transform 0.25s;box-shadow:0 2px 6px rgba(0,0,0,0.3);pointer-events:none}
    .toggle input:checked ~ .thumb{transform:translateX(22px)}

    /* Buttons */
    .btns{display:flex;gap:10px;margin-top:24px}
    .btns a,
    .btns button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
      padding:11px 20px;border-radius:50px;font-family:'Baloo 2',cursive;
      font-size:15px;cursor:pointer;text-decoration:none;letter-spacing:0.5px;border:none;transition:all 0.18s}
    .btn-back{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.8);
      border:1px solid rgba(255,255,255,0.16)}
    .btn-back:hover{background:rgba(255,255,255,0.16);color:#fff}
    .btn-save{background:linear-gradient(135deg,#ffe234,#ff8c28);color:#1a0800;
      box-shadow:0 3px 0 rgba(140,60,0,0.5),0 6px 20px rgba(255,160,0,0.3)}
    .btn-save:hover{transform:translateY(-2px);box-shadow:0 5px 0 rgba(140,60,0,0.5),0 10px 28px rgba(255,160,0,0.45)}
  </style>
</head>
<body>
<div class="bg"></div>

<div class="page">
  <div class="card">
    <div class="title">⚙️ Settings</div>
    <div class="subtitle">Audio &amp; Preferences</div>

    <!-- BIG SOUND TOGGLE -->
    <button class="sound-big" id="soundBig" onclick="toggleSound()">
      <div class="sb-left">
        <div class="sb-ico" id="soundIco">🔊</div>
        <div class="sb-label">
          <b>Sound</b>
          <span id="soundDesc">All audio is enabled</span>
        </div>
      </div>
      <div class="sb-pill on" id="soundPill">ON</div>
    </button>

    <!-- VOLUME SLIDERS -->
    <div class="vol-section" id="volSection">
      <div class="row">
        <div class="row-label">Master Volume<span class="row-val" id="masterLbl">80%</span></div>
        <div class="vol-bar">
          <span class="vi" onclick="setVol('master',0)">🔇</span>
          <input type="range" id="masterSlider" min="0" max="100" value="80" oninput="updateVol('master',this.value)"/>
          <span class="vi" onclick="setVol('master',100)">🔊</span>
        </div>
      </div>
      <div class="row">
        <div class="row-label">Music Volume<span class="row-val" id="musicLbl">60%</span></div>
        <div class="vol-bar">
          <span class="vi" onclick="setVol('music',0)">🎵</span>
          <input type="range" id="musicSlider" min="0" max="100" value="60" oninput="updateVol('music',this.value)"/>
          <span class="vi" onclick="setVol('music',100)">🎶</span>
        </div>
      </div>
      <div class="row">
        <div class="row-label">Sound Effects<span class="row-val" id="sfxLbl">100%</span></div>
        <div class="vol-bar">
          <span class="vi" onclick="setVol('sfx',0)">💥</span>
          <input type="range" id="sfxSlider" min="0" max="100" value="100" oninput="updateVol('sfx',this.value)"/>
          <span class="vi" onclick="setVol('sfx',100)">🔔</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="toggle-row">
      <div class="tl-text"><b>Show Grid</b><span>Display background grid in the game</span></div>
      <label class="toggle"><input type="checkbox" id="gridT" checked/><div class="track"></div><div class="thumb"></div></label>
    </div>
    <div class="toggle-row">
      <div class="tl-text"><b>Stress Colors</b><span>Beams change color under load</span></div>
      <label class="toggle"><input type="checkbox" id="stressT" checked/><div class="track"></div><div class="thumb"></div></label>
    </div>
    <div class="toggle-row">
      <div class="tl-text"><b>Tutorial Tips</b><span>Show hints on the Tutorial level</span></div>
      <label class="toggle"><input type="checkbox" id="tutT" checked/><div class="track"></div><div class="thumb"></div></label>
    </div>

    <div class="btns">
      <a class="btn-back" href="index.html">‹ Back</a>
      <button class="btn-save" onclick="saveAndBack()">✔ Save</button>
    </div>
  </div>
</div>

<script>
const DEFS={soundOn:true,master:80,music:60,sfx:100,grid:true,stress:true,tut:true};
let cfg=Object.assign({},DEFS);
try{const s=localStorage.getItem('bridgeSettings');if(s)cfg=Object.assign(cfg,JSON.parse(s));}catch(e){}

function applyUI(){
  document.getElementById('masterSlider').value=cfg.master;
  document.getElementById('musicSlider').value=cfg.music;
  document.getElementById('sfxSlider').value=cfg.sfx;
  document.getElementById('masterLbl').textContent=cfg.master+'%';
  document.getElementById('musicLbl').textContent=cfg.music+'%';
  document.getElementById('sfxLbl').textContent=cfg.sfx+'%';
  document.getElementById('gridT').checked=cfg.grid;
  document.getElementById('stressT').checked=cfg.stress;
  document.getElementById('tutT').checked=cfg.tut;
  updateSoundUI();
}
function updateSoundUI(){
  const big=document.getElementById('soundBig'),ico=document.getElementById('soundIco'),
    pill=document.getElementById('soundPill'),desc=document.getElementById('soundDesc'),
    vols=document.getElementById('volSection');
  if(cfg.soundOn){
    big.classList.remove('off');ico.textContent='🔊';pill.textContent='ON';pill.className='sb-pill on';
    desc.textContent='All audio is enabled';vols.classList.remove('muted');
  }else{
    big.classList.add('off');ico.textContent='🔇';pill.textContent='OFF';pill.className='sb-pill off';
    desc.textContent='All audio is muted';vols.classList.add('muted');
  }
}
function toggleSound(){cfg.soundOn=!cfg.soundOn;updateSoundUI();}
function updateVol(k,v){cfg[k]=+v;document.getElementById(k+'Lbl').textContent=v+'%';}
function setVol(k,v){cfg[k]=v;document.getElementById(k+'Slider').value=v;document.getElementById(k+'Lbl').textContent=v+'%';}
function saveAndBack(){
  cfg.grid=document.getElementById('gridT').checked;
  cfg.stress=document.getElementById('stressT').checked;
  cfg.tut=document.getElementById('tutT').checked;
  try{localStorage.setItem('bridgeSettings',JSON.stringify(cfg));}catch(e){}
  window.location.href='index.html';
}
applyUI();
</script>
</body>
</html>
